<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drone Label Generator</title>
<!-- Bump ?v= on each deploy so browsers fetch fresh assets instead of cached ones. -->
<link rel="stylesheet" href="style.css?v=20260716b">
</head>
<body>

<header class="topbar">
  <h1>Drone Label Generator</h1>
  <p class="muted">
    Printable QR identification plates for drone assets — rendered entirely
    in your browser, nothing is uploaded.
  </p>
</header>

<main class="app">

  <form id="controls" onsubmit="return false">

    <section>
      <h2>Preset</h2>
      <label class="field">
        <span>Label preset <small>sets size, layout &amp; spacing</small></span>
        <select id="preset">
          <option value="">Custom / manual</option>
        </select>
      </label>
    </section>

    <section>
      <h2>Layout</h2>
      <label class="field">
        <span>Label layout</span>
        <select name="layout"></select>
      </label>
      <p id="layout-description" class="muted"></p>
    </section>

    <section>
      <h2>Identity</h2>
      <label class="field" data-key="label_prefix">
        <span>Prefix</span>
        <input name="label_prefix" type="text">
      </label>
      <div class="field-row">
        <label class="field" data-key="number_start">
          <span>First #</span>
          <input name="number_start" type="number" step="1">
        </label>
        <label class="field" data-key="number_end">
          <span>Last #</span>
          <input name="number_end" type="number" step="1">
        </label>
        <label class="field" data-key="number_pad">
          <span>Zero-pad</span>
          <input name="number_pad" type="number" min="0" max="10" step="1">
        </label>
      </div>
      <label class="field" data-key="url_template">
        <span>URL template <small>{prefix} {i}</small></span>
        <input name="url_template" type="text">
      </label>
    </section>

    <section>
      <h2>Plate</h2>
      <div class="field-row">
        <label class="field" data-key="plate_width_in">
          <span>Width (in)</span>
          <input name="plate_width_in" type="number" min="0.25" step="any">
        </label>
        <label class="field" data-key="plate_height_in">
          <span>Height (in)</span>
          <input name="plate_height_in" type="number" min="0.25" step="any">
        </label>
      </div>
      <div class="field-row">
        <label class="field" data-key="dpi">
          <span>DPI</span>
          <input name="dpi" type="number" min="72" max="1200" step="1">
        </label>
        <label class="field" data-key="corner_radius_in">
          <span>Corner radius (in)</span>
          <input name="corner_radius_in" type="number" min="0" step="any">
        </label>
      </div>
    </section>

    <section>
      <h2>QR code</h2>
      <div class="field-row">
        <label class="field" data-key="qr_version">
          <span>Version <small>0 = auto</small></span>
          <input name="qr_version" type="number" min="0" max="40" step="1">
        </label>
        <label class="field" data-key="qr_error_correct">
          <span>Error correction</span>
          <select name="qr_error_correct">
            <option value="L">L (7%)</option>
            <option value="M">M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
          </select>
        </label>
      </div>
      <div class="field-row">
        <label class="field" data-key="qr_border">
          <span>Quiet zone (modules)</span>
          <input name="qr_border" type="number" min="0" max="10" step="1">
        </label>
        <label class="field" data-key="qr_height_fraction">
          <span>Size (fraction of height)</span>
          <input name="qr_height_fraction" type="number" min="0.1" max="1" step="0.05">
        </label>
      </div>
    </section>

    <section>
      <h2>Typography</h2>
      <label class="field" data-key="font_family">
        <span>Font</span>
        <select name="font_family"></select>
      </label>
      <div class="field-row">
        <label class="field" data-key="font_small_pct">
          <span>Header size <small>% H</small></span>
          <input name="font_small_pct" type="number" min="0" step="any">
        </label>
        <label class="field" data-key="font_large_pct">
          <span>Number size <small>% H</small></span>
          <input name="font_large_pct" type="number" min="0" step="any">
        </label>
        <label class="field" data-key="font_tiny_pct">
          <span>Footer size <small>% H</small></span>
          <input name="font_tiny_pct" type="number" min="0" step="any">
        </label>
      </div>
      <label class="field" data-key="footer_lines">
        <span>Footer lines <small>one per line</small></span>
        <textarea name="footer_lines" rows="2" spellcheck="false"></textarea>
      </label>
      <label class="field checkbox" data-key="show_caption">
        <input name="show_caption" type="checkbox">
        <span>Show ID caption under QR</span>
      </label>
    </section>

    <section>
      <h2>FAA registration</h2>
      <label class="field checkbox" data-key="show_faa">
        <input name="show_faa" type="checkbox">
        <span>Show FAA number on side edge</span>
      </label>
      <div class="field-row">
        <label class="field" data-key="faa_side">
          <span>Side</span>
          <select name="faa_side">
            <option value="right">Right edge</option>
            <option value="left">Left edge</option>
          </select>
        </label>
        <label class="field" data-key="faa_size_pct">
          <span>Size <small>% H</small></span>
          <input name="faa_size_pct" type="number" min="0" step="any">
        </label>
      </div>
      <div class="field">
        <span>Registration CSV <small>matched by Nickname number</small></span>
        <input type="file" id="faa-csv" accept=".csv,text/csv">
      </div>
      <p id="faa-csv-status" class="muted"></p>
      <button type="button" id="faa-clear" class="subtle">Clear imported CSV</button>
    </section>

    <section>
      <h2>Spacing <small>(% of plate)</small></h2>
      <div class="field-row">
        <label class="field" data-key="top_pad_pct">
          <span>Top padding <small>% H</small></span>
          <input name="top_pad_pct" type="number" step="any">
        </label>
        <label class="field" data-key="header_gap_pct">
          <span>Header gap <small>% H</small></span>
          <input name="header_gap_pct" type="number" step="any">
        </label>
      </div>
      <div class="field-row">
        <label class="field" data-key="number_gap_pct">
          <span>Number gap <small>% H</small></span>
          <input name="number_gap_pct" type="number" step="any">
        </label>
        <label class="field" data-key="footer_gap_pct">
          <span>Footer gap <small>% H</small></span>
          <input name="footer_gap_pct" type="number" step="any">
        </label>
      </div>
      <div class="field-row">
        <label class="field" data-key="blurb_gap_pct">
          <span>Blurb gap <small>% H</small></span>
          <input name="blurb_gap_pct" type="number" step="any">
        </label>
        <label class="field" data-key="footer_pad_pct">
          <span>Footer offset <small>% W</small></span>
          <input name="footer_pad_pct" type="number" step="any">
        </label>
      </div>
      <div class="field-row">
        <label class="field" data-key="inner_pad_pct">
          <span>Inner padding <small>% W</small></span>
          <input name="inner_pad_pct" type="number" min="0" step="any">
        </label>
      </div>
    </section>

    <section class="actions">
      <button type="button" id="btn-pdf" class="primary">Download PDF</button>
      <button type="button" id="btn-zip">Download PNGs (ZIP)</button>
      <button type="button" id="btn-share">Copy share link</button>
      <button type="button" id="btn-reset" class="subtle">Reset to defaults</button>
    </section>

  </form>

  <section class="preview">
    <div id="status-line" class="muted"></div>
    <div id="error-box" class="error" hidden></div>
    <div id="preview-grid"></div>
  </section>

</main>

<script src="vendor/qrcode.js"></script>
<script src="layouts.js?v=20260716b"></script>
<script src="exporters.js?v=20260716b"></script>
<script src="app.js?v=20260716b"></script>

</body>
</html>
